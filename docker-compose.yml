services:
  pumpkin:
    # Make sure to change the tag to the pumpkin version you want to use.
    # https://github.com/Pumpkin-MC/Pumpkin/pkgs/container/pumpkin/versions?filters%5Bversion_type%5D=tagged
    #image: ghcr.io/pumpkin-mc/pumpkin:master
    build: .
    ports:
      - "25565:25565"
    volumes:
      - ./data:/pumpkin
      # Use the following, if you want to make your config immutable
      #- ./config:/pumpkin/config:ro
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    stdin_open: true
    tty: true
    cap_drop:
      - ALL
    read_only: true

  dashboard:
    build: ./dashboard
    ports:
      - "3000:3000"
    depends_on:
      - pumpkin
    environment:
      - RCON_HOST=pumpkin
      - RCON_PORT=25575
      - RCON_PASSWORD=${RCON_PASSWORD:-}
      - CONFIG_PATH=/pumpkin-data/pumpkin.toml
      - DASHBOARD_TOKEN=${DASHBOARD_TOKEN:-}
    volumes:
      - ./data:/pumpkin-data
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
